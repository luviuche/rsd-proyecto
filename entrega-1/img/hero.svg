<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cielo" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#4a0712"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40,0 L0,0 L0,40" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" fill="none"/>
    </pattern>
  </defs>

  <!-- Fondo y cuadrícula sutil -->
  <rect width="1200" height="400" fill="url(#cielo)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>

  <!-- Suelo -->
  <rect x="0" y="340" width="1200" height="60" fill="#0a0a0a"/>

  <!-- Cables aéreos -->
  <path d="M0,150 Q300,180 600,160 T1200,150" stroke="#888" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M0,180 Q300,220 600,200 T1200,180" stroke="#888" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- Torre izquierda -->
  <g stroke="#aaa" stroke-width="2" fill="none">
    <polygon points="170,340 230,340 215,140 185,140" fill="#1a1a1a" stroke="#aaa"/>
    <line x1="200" y1="140" x2="200" y2="90"/>
    <line x1="160" y1="160" x2="240" y2="160"/>
    <line x1="150" y1="190" x2="250" y2="190"/>
    <line x1="170" y1="220" x2="230" y2="220"/>
  </g>

  <!-- Torre central -->
  <g stroke="#aaa" stroke-width="2" fill="none">
    <polygon points="570,340 630,340 615,120 585,120" fill="#1a1a1a" stroke="#aaa"/>
    <line x1="600" y1="120" x2="600" y2="70"/>
    <line x1="555" y1="145" x2="645" y2="145"/>
    <line x1="545" y1="175" x2="655" y2="175"/>
    <line x1="565" y1="205" x2="635" y2="205"/>
  </g>

  <!-- Torre derecha -->
  <g stroke="#aaa" stroke-width="2" fill="none">
    <polygon points="970,340 1030,340 1015,140 985,140" fill="#1a1a1a" stroke="#aaa"/>
    <line x1="1000" y1="140" x2="1000" y2="90"/>
    <line x1="960" y1="160" x2="1040" y2="160"/>
    <line x1="950" y1="190" x2="1050" y2="190"/>
  </g>

  <!-- Rayo decorativo -->
  <path d="M850,30 L820,110 L860,115 L830,210 L880,200 L850,300"
        stroke="#C8102E" stroke-width="4" fill="none" opacity="0.75"
        stroke-linejoin="round" stroke-linecap="round"/>
</svg>
